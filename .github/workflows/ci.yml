name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install project dependencies
        run: uv sync

      - name: Install dev tools
        run: uv pip install "pytest>=8.3.5" "ruff>=0.11.2"

      - name: Lint (critical checks)
        run: uv run ruff check . --select E9,F63,F7,F82

      - name: Code tests
        run: uv run pytest -q
